<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --card: #ffffff;
      --accent: #c9763a;
      --accent-light: #f5e6d8;
      --text: #2a2520;
      --muted: #9e9189;
      --done: #bbb4ac;
      --shadow: 0 4px 24px rgba(80,60,40,0.10);
      --radius: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px 80px;
    }

    .container { width: 100%; max-width: 480px; }
    header { margin-bottom: 36px; }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    header p {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
      font-weight: 300;
    }

    .input-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-card input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: transparent;
      padding: 4px 2px;
    }

    .input-card input::placeholder { color: var(--done); }

    .input-card button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 40px;
      height: 40px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s, transform 0.12s;
    }

    .input-card button:hover { background: #b36530; }
    .input-card button:active { transform: scale(0.93); }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 14px;
      transition: opacity 0.2s, transform 0.2s;
      animation: slideIn 0.22s cubic-bezier(.22,1,.36,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #d9cfc6;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .check-btn::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.15s, transform 0.15s;
    }

    .task-item.done .check-btn { border-color: var(--accent); background: var(--accent-light); }
    .task-item.done .check-btn::after { opacity: 1; transform: scale(1); }

    .task-text {
      flex: 1;
      font-size: 0.97rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
      word-break: break-word;
      position: relative;
    }

    .task-text::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 1.5px;
      background: var(--done);
      transition: width 0.25s cubic-bezier(.22,1,.36,1);
    }

    .task-item.done .task-text { color: var(--done); }
    .task-item.done .task-text::after { width: 100%; }

    .del-btn {
      background: transparent;
      border: none;
      color: #d9cfc6;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .del-btn:hover { color: #c0392b; background: #fce8e6; }

    .empty {
      text-align: center;
      padding: 48px 0 24px;
      color: var(--done);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.8;
    }

    .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }

    /* 編集用input */
    .task-edit {
      flex: 1;
      border: none;
      border-bottom: 2px solid var(--accent);
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      background: transparent;
      padding: 2px 0;
    }

    .stats {
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 18px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Today's<br>Tasks</h1>
      <p>やることを整理しよう</p>
    </header>

    <div class="input-card">
      <input type="text" id="taskInput" placeholder="新しいタスクを入力…" maxlength="100">
      <button id="addBtn" title="追加">＋</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
    <p class="stats" id="stats"></p>
  </div>

  <script>
    let tasks = [];

    const input   = document.getElementById('taskInput');
    const addBtn  = document.getElementById('addBtn');
    const listEl  = document.getElementById('taskList');
    const statsEl = document.getElementById('stats');

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ id: Date.now(), text, done: false });
      input.value = '';
      render();
      input.focus();
    }

    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function editTask(id, spanEl) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;

      const editInput = document.createElement("input");
      editInput.className = "task-edit";
      editInput.value = t.text;
      spanEl.replaceWith(editInput);
      editInput.focus();
      editInput.select();

      function save() {
        const newText = editInput.value.trim();
        if (newText) t.text = newText;
        render();
      }

      editInput.addEventListener("blur", save);
      editInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") editInput.blur();
        if (e.key === "Escape") { editInput.removeEventListener("blur", save); render(); }
      });
    }

    function render() {
      listEl.innerHTML = '';

      if (tasks.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';

        const icon = document.createElement('span');
        icon.textContent = '✦';

        const msg = document.createElement('span');
        msg.textContent = 'タスクがありません 上の入力欄から追加してみましょう';

        li.append(icon, msg);
        listEl.appendChild(li);
        statsEl.textContent = '';
        return;
      }

      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');

        const checkBtn = document.createElement('button');
        checkBtn.className = 'check-btn';
        checkBtn.title = task.done ? '未完了に戻す' : '完了にする';
        checkBtn.addEventListener('click', () => toggleTask(task.id));

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;
        span.addEventListener('click', () => toggleTask(task.id));
        span.addEventListener('dblclick', () => editTask(task.id, span)); // ダブルクリックで編集

        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.title = '削除';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', () => deleteTask(task.id));

        li.append(checkBtn, span, delBtn);
        listEl.appendChild(li);
      });

      const done = tasks.filter(t => t.done).length;
      statsEl.textContent = `${done} / ${tasks.length} 完了`;
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    render();
  </script>
</body>
</html>
