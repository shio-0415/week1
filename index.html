<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --card: #ffffff;
      --accent: #c9763a;
      --accent-light: #f5e6d8;
      --text: #2a2520;
      --muted: #9e9189;
      --done: #bbb4ac;
      --shadow: 0 4px 24px rgba(80,60,40,0.10);
      --radius: 18px;
      --overdue: #c0392b;
      --overdue-light: #fce8e6;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px 80px;
    }

    .container { width: 100%; max-width: 480px; }
    header { margin-bottom: 36px; }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    header p {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
      font-weight: 300;
    }

    /* ── タスク入力 ── */
    .input-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-card input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: transparent;
      padding: 4px 2px;
    }

    .input-card input[type="text"]::placeholder { color: var(--done); }

    .input-card button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 40px;
      height: 40px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s, transform 0.12s;
    }

    .input-card button:hover  { background: #b36530; }
    .input-card button:active { transform: scale(0.93); }

    /* 締め切り日入力行 */
    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .input-card input[type="date"] {
      flex: 1;
      border: none;
      border-bottom: 1px solid #e8e2dc;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: transparent;
      padding: 3px 2px;
      cursor: pointer;
    }

    .input-card input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.4;
      cursor: pointer;
    }

    /* ── フィルター ── */
    .filter-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .filter-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 12px;
      border: 1.5px solid transparent;
      background: var(--card);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    .search-box {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .search-icon { color: var(--done); font-size: 0.95rem; flex-shrink: 0; }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: transparent;
    }

    .search-box input::placeholder { color: var(--done); }

    .search-clear {
      display: none;
      background: transparent;
      border: none;
      color: var(--done);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    .search-clear.visible { display: block; }
    .search-clear:hover   { color: var(--text); }

    /* ── タスクリスト ── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      padding: 14px 16px;
      gap: 14px;
      animation: slideIn 0.22s cubic-bezier(.22,1,.36,1);
      border-left: 3px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }

    /* 期限切れハイライト（未完了のみ） */
    .task-item.overdue {
      border-left-color: var(--overdue);
      background: #fffafa;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #d9cfc6;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      margin-top: 1px;
    }

    .check-btn::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.15s, transform 0.15s;
    }

    .task-item.done .check-btn { border-color: var(--accent); background: var(--accent-light); }
    .task-item.done .check-btn::after { opacity: 1; transform: scale(1); }

    /* テキスト＋締め切り日のラッパー */
    .task-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .task-text {
      font-size: 0.97rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      word-break: break-word;
      position: relative;
      transition: color 0.2s;
    }

    .task-text::after {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 0; height: 1.5px;
      background: var(--done);
      transition: width 0.25s cubic-bezier(.22,1,.36,1);
    }

    .task-item.done .task-text        { color: var(--done); }
    .task-item.done .task-text::after { width: 100%; }

    mark {
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 2px;
    }

    /* 締め切り日バッジ */
    .due-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      width: fit-content;
    }

    .due-badge.overdue-badge {
      color: var(--overdue);
      font-weight: 600;
    }

    .due-badge.done-badge {
      color: var(--done);
      text-decoration: line-through;
    }

    .del-btn {
      background: transparent;
      border: none;
      color: #d9cfc6;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      margin-top: -2px;
    }

    .del-btn:hover { color: var(--overdue); background: var(--overdue-light); }

    .empty {
      text-align: center;
      padding: 48px 0 24px;
      color: var(--done);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.8;
    }

    .empty-icon { display: block; font-size: 2rem; margin-bottom: 8px; }

    .task-edit {
      flex: 1;
      border: none;
      border-bottom: 2px solid var(--accent);
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      background: transparent;
      padding: 2px 0;
    }

    .stats {
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 18px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Today's<br>Tasks</h1>
      <p>やることを整理しよう</p>
    </header>

    <!-- タスク入力 -->
    <div class="input-card">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="新しいタスクを入力…" maxlength="100">
        <button id="addBtn" title="追加">＋</button>
      </div>
      <div class="date-row">
        <span class="date-label">📅 締め切り</span>
        <input type="date" id="dateInput">
      </div>
    </div>

    <!-- フィルター: 状態ボタン -->
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了のみ</button>
      <button class="filter-btn" data-filter="done">完了済みのみ</button>
    </div>

    <!-- フィルター: キーワード検索 -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="タスク名で絞り込む…">
      <button class="search-clear" id="searchClear" title="クリア">×</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
    <p class="stats" id="stats"></p>
  </div>

  <script>
    const STORAGE_KEY = 'todo-tasks';

    let tasks         = load();
    let currentFilter = 'all';
    let keyword       = '';

    const taskInput   = document.getElementById('taskInput');
    const dateInput   = document.getElementById('dateInput');
    const addBtn      = document.getElementById('addBtn');
    const listEl      = document.getElementById('taskList');
    const statsEl     = document.getElementById('stats');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const filterBtns  = document.querySelectorAll('.filter-btn');

    /* ── LocalStorage ── */

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    /* ── タスク操作 ── */

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.push({
        id:  Date.now(),
        text,
        done: false,
        due:  dateInput.value || null
      });
      taskInput.value = '';
      dateInput.value = '';
      save();
      render();
      taskInput.focus();
    }

    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function editTask(id, spanEl) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const editInput = document.createElement('input');
      editInput.className = 'task-edit';
      editInput.value = t.text;
      spanEl.replaceWith(editInput);
      editInput.focus();
      editInput.select();

      function saveEdit() {
        const newText = editInput.value.trim();
        if (newText) t.text = newText;
        save();
        render();
      }

      editInput.addEventListener('blur', saveEdit);
      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter')  editInput.blur();
        if (e.key === 'Escape') { editInput.removeEventListener('blur', saveEdit); render(); }
      });
    }

    /* ── 期限切れ判定 ── */

    function isOverdue(task) {
      if (!task.due || task.done) return false;
      const today = new Date().toISOString().slice(0, 10);
      return task.due < today;
    }

    /* ── フィルター ── */

    function getFiltered() {
      return tasks.filter(t => {
        const matchState =
          currentFilter === 'all'    ? true :
          currentFilter === 'active' ? !t.done :
                                        t.done;
        const matchWord = keyword === '' ||
          t.text.toLowerCase().includes(keyword.toLowerCase());
        return matchState && matchWord;
      });
    }

    function highlight(text) {
      if (!keyword) return text;
      const esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
    }

    function formatDue(due, done) {
      if (!due) return null;
      const today = new Date().toISOString().slice(0, 10);
      const overdue = due < today && !done;
      const [y, m, d] = due.split('-');
      const label = `${parseInt(m)}/${parseInt(d)}`;
      return { label: overdue ? `⚠ ${label} 期限切れ` : `📅 ${label}`, overdue, done };
    }

    /* ── 描画 ── */

    function render() {
      listEl.innerHTML = '';
      const filtered = getFiltered();

      if (filtered.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';
        const icon = document.createElement('span');
        icon.className   = 'empty-icon';
        icon.textContent = keyword ? '🔍' : '✦';
        const msg = document.createElement('span');
        msg.textContent =
          keyword                    ? `「${keyword}」に一致するタスクはありません` :
          currentFilter === 'active' ? '未完了のタスクはありません' :
          currentFilter === 'done'   ? '完了済みのタスクはありません' :
                                       'タスクがありません　上の入力欄から追加してみましょう';
        li.append(icon, msg);
        listEl.appendChild(li);
        statsEl.textContent = '';
        return;
      }

      filtered.forEach(task => {
        const overdue = isOverdue(task);

        const li = document.createElement('li');
        li.className = 'task-item' +
          (task.done ? ' done' : '') +
          (overdue   ? ' overdue' : '');

        const checkBtn = document.createElement('button');
        checkBtn.className = 'check-btn';
        checkBtn.title = task.done ? '未完了に戻す' : '完了にする';
        checkBtn.addEventListener('click', () => toggleTask(task.id));

        const body = document.createElement('div');
        body.className = 'task-body';

        const span = document.createElement('span');
        span.className = 'task-text';
        span.innerHTML  = highlight(task.text);
        span.addEventListener('click',    () => toggleTask(task.id));
        span.addEventListener('dblclick', () => editTask(task.id, span));

        body.appendChild(span);

        const dueFmt = formatDue(task.due, task.done);
        if (dueFmt) {
          const badge = document.createElement('span');
          badge.className = 'due-badge' +
            (dueFmt.overdue ? ' overdue-badge' : '') +
            (dueFmt.done    ? ' done-badge'    : '');
          badge.textContent = dueFmt.label;
          body.appendChild(badge);
        }

        const delBtn = document.createElement('button');
        delBtn.className   = 'del-btn';
        delBtn.title       = '削除';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', () => deleteTask(task.id));

        li.append(checkBtn, body, delBtn);
        listEl.appendChild(li);
      });

      const doneCount = tasks.filter(t => t.done).length;
      statsEl.textContent = `${doneCount} / ${tasks.length} 完了`;
    }

    /* ── イベント ── */

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    searchInput.addEventListener('input', () => {
      keyword = searchInput.value;
      searchClear.classList.toggle('visible', keyword.length > 0);
      render();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      keyword = '';
      searchClear.classList.remove('visible');
      searchInput.focus();
      render();
    });

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    render();
  </script>
</body>
</html>
